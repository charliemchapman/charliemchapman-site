about_intro: Hi, I'm Charlie Chapman. I'm an app developer, podcaster, designer, and wannabe motion graphics artist.
about_paragraphs:
  - These days I'm a Developer Advocate at RevenueCat, building indie apps like Dark Noise and Framous, hosting the Launched podcast, and organizing STL Swift in St. Louis.
  - This site is where I write about shipping software, collect the things I make, and keep a running record of the talks, videos, and podcast episodes that shape my work.
