---
layout: default
title: Archive
---

<div class="page-intro">
  <h1 class="page-intro__title">Archive</h1>
  <p class="page-intro__subtitle">Every article I've published, listed from newest to oldest.</p>
</div>

<section class="archive">
  {% for post in site.posts %}
  <article class="archive__item">
    <div class="archive__meta">
      <span class="archive__date">{{ post.date | date: "%B %-d, %Y" }}</span>
    </div>
    <div class="archive__content">
      <h2 class="archive__title"><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <p class="archive__excerpt">{{ post.excerpt | strip_html | normalize_whitespace | truncate: 140 }}</p>
    </div>
  </article>
  {% endfor %}
</section>
