<nav class="pager" aria-label="Pagination">
  {% if paginator.previous_page %}
    <a href="{{ paginator.previous_page_path }}" class="pager__link pager__link--previous">← Newer posts</a>
  {% else %}
    <span class="pager__link pager__link--disabled">← Newer posts</span>
  {% endif %}
  <span class="pager__status">Page {{ paginator.page }} of {{ paginator.total_pages }}</span>
  {% if paginator.next_page %}
    <a href="{{ paginator.next_page_path }}" class="pager__link pager__link--next">Older posts →</a>
  {% else %}
    <span class="pager__link pager__link--disabled">Older posts →</span>
  {% endif %}
</nav>
