{% assign profile = site.data.profile %}
<aside class="site-sidebar">
  <div class="site-sidebar__top">
    <a class="site-brand" href="/">
      <span class="site-brand__title">{{ profile.brand_subtitle }}</span>
    </a>

    <nav class="site-nav" aria-label="Primary">
      {% for item in site.data.navigation %}
        <a class="site-nav__link{% if page.nav_key == item.key %} is-current{% endif %}" href="{{ item.link }}">
          <span class="site-nav__active" aria-hidden="true"></span>
          <span class="site-nav__icon material-symbols-outlined" aria-hidden="true">
            {% case item.key %}
              {% when "home" %}home
              {% when "apps" %}apps
              {% when "about" %}person
              {% else %}arrow_forward
            {% endcase %}
          </span>
          <span>{{ item.name }}</span>
        </a>
      {% endfor %}
    </nav>
  </div>
</aside>
